<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<title>CallNinja · UI Kit</title>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html, body { margin:0; padding:0; background: #E8E8EC; min-height:100vh; font-family: var(--font-sans); }
  body { display:flex; gap: 40px; padding: 96px 24px 40px; justify-content: center; align-items: flex-start; flex-wrap: wrap; }
  .stage { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .stage .label { font-size: 12px; color: #444; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; }
  .toolbar { position: fixed; top: 14px; left: 50%; transform: translateX(-50%);
             background: #fff; border: 1px solid #0002; border-radius: 999px;
             padding: 6px; display:flex; gap: 4px; z-index: 100; box-shadow: 0 4px 16px #0001; }
  .toolbar button { border:0; background:transparent; padding: 8px 14px; border-radius: 999px; cursor:pointer; font: inherit; font-size: 13px; font-weight: 600; color: #333; }
  .toolbar button.active { background: #111; color: #fff; }
  .row { display: flex; gap: 40px; flex-wrap: wrap; justify-content: center; }
  @keyframes cnspin { to { transform: rotate(360deg); } }
  @keyframes cnFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cnSlide { from { transform: translateY(40px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  @keyframes cnPop { from { transform: scale(0.92); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .cn-spinner { display:inline-block; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="screens.jsx"></script>
</head>
<body>
<div class="toolbar">
  <button id="tb-light" class="active" onclick="window.__setTheme(false)">Light</button>
  <button id="tb-dark" onclick="window.__setTheme(true)">Dark</button>
  <button onclick="window.__reset()">Reset flow</button>
</div>
<div id="root"></div>

<script type="text/babel">
const KR = { flag:'🇰🇷', name:'대한민국', nameEn:'Korea', dial:'+82' };

const emptySlots = () => Array.from({ length: 10 }, (_, i) => ({
  empty: true, enabled: false, pattern: null, prefix: null, input: null, reloading: false,
}));

const seededSlots = () => {
  const s = emptySlots();
  s[0] = { empty:false, enabled:true, pattern:'070-85XX-XXXX', prefix:8270850, input:'070-8500-0000' };
  s[1] = { empty:false, enabled:true, pattern:'031-88XX-XXXX', prefix:8231880, input:'031-880-0000' };
  s[2] = { empty:false, enabled:false, pattern:'010-34XX-XXXX', prefix:821034, input:'010-3400-0000' };
  return s;
};

function App() {
  const [dark, setDark] = React.useState(false);
  const [phase, setPhase] = React.useState('country'); // country | extensions | main
  const [country, setCountry] = React.useState(KR);
  const [extensionsEnabled, setExt] = React.useState(0);
  const [slots, setSlots] = React.useState(seededSlots());
  const [showPicker, setShowPicker] = React.useState(false);

  window.__setTheme = (d) => {
    setDark(d);
    document.getElementById('tb-light').classList.toggle('active', !d);
    document.getElementById('tb-dark').classList.toggle('active', d);
  };
  window.__reset = () => { setPhase('country'); setExt(0); setSlots(seededSlots()); };

  const state = { slots, extensionsEnabled };
  const setState = (ns) => { setSlots(ns.slots); if (ns.extensionsEnabled !== undefined) setExt(ns.extensionsEnabled); };

  let screen;
  if (phase === 'country') {
    screen = <OnboardingCountry dark={dark} country={country} onPick={() => setShowPicker(true)} onNext={() => setPhase('extensions')}/>;
  } else if (phase === 'extensions') {
    screen = <OnboardingExtensions dark={dark} enabled={extensionsEnabled}
      onTick={() => setExt(Math.min(10, extensionsEnabled+1))}
      onDone={() => setPhase('main')}/>;
  } else {
    screen = <MainScreen state={state} setState={setState} dark={dark}/>;
  }

  return (
    <>
      <div className="row">
        <div className="stage">
          <div className="label">
            {phase === 'country' ? 'Onboarding · Country' : phase === 'extensions' ? 'Onboarding · Extensions' : 'Main'}
          </div>
          <IOSDevice dark={dark}>{screen}</IOSDevice>
        </div>
      </div>

      {showPicker && (
        <CountryPickerModal dark={dark} selected={country}
          onClose={() => setShowPicker(false)}
          onSelect={(c) => { setCountry(c); setShowPicker(false); }}/>
      )}
    </>
  );
}

const COUNTRIES = [
  { iso:'KR', flag:'🇰🇷', name:'대한민국', nameEn:'Korea', dial:'+82' },
  { iso:'US', flag:'🇺🇸', name:'미국', nameEn:'United States', dial:'+1' },
  { iso:'JP', flag:'🇯🇵', name:'일본', nameEn:'Japan', dial:'+81' },
  { iso:'CN', flag:'🇨🇳', name:'중국', nameEn:'China', dial:'+86' },
  { iso:'GB', flag:'🇬🇧', name:'영국', nameEn:'United Kingdom', dial:'+44' },
  { iso:'VN', flag:'🇻🇳', name:'베트남', nameEn:'Vietnam', dial:'+84' },
  { iso:'DE', flag:'🇩🇪', name:'독일', nameEn:'Germany', dial:'+49' },
];

function CountryPickerModal({ dark, selected, onClose, onSelect }) {
  const t = theme(dark);
  const [q, setQ] = React.useState('');
  const filtered = COUNTRIES.filter(c =>
    !q || c.name.includes(q) || c.nameEn.toLowerCase().includes(q.toLowerCase()) || c.dial.includes(q)
  );
  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.35)', zIndex:200, display:'flex', alignItems:'center', justifyContent:'center' }} onClick={onClose}>
      <div onClick={e=>e.stopPropagation()} style={{
        width: 402, maxHeight: 680, background: t.bg, borderRadius: 16, overflow:'hidden',
        display:'flex', flexDirection:'column',
      }}>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', padding:'14px 16px', borderBottom:`0.5px solid ${t.sep}` }}>
          <div style={{ width:30 }}/>
          <div style={{ fontSize:17, fontWeight:600, color:t.fg }}>나라 선택</div>
          <div style={{ color:t.accent, cursor:'pointer' }} onClick={onClose}>닫기</div>
        </div>
        <div style={{ padding:'12px 16px' }}>
          <div style={{ display:'flex', alignItems:'center', gap:8, background:t.input, borderRadius:10, padding:'8px 12px' }}>
            {Icon.search(t.fg2)}
            <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="나라 검색"
              style={{ flex:1, border:0, background:'transparent', outline:'none', fontSize:17, color:t.fg }}/>
          </div>
        </div>
        <div style={{ flex:1, overflowY:'auto' }}>
          <CNList dark={dark}>
            {filtered.map(c => (
              <CNRow key={c.iso} dark={dark} onClick={() => onSelect(c)}>
                <div style={{ fontSize:24 }}>{c.flag}</div>
                <div style={{ flex:1, fontSize:17 }}>{c.name}</div>
                <div style={{ color:t.fg2 }}>{c.dial}</div>
                {selected?.iso === c.iso && <div style={{ marginLeft:8 }}>{Icon.check(CN.blue)}</div>}
              </CNRow>
            ))}
          </CNList>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
