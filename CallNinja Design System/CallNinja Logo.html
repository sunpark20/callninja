  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-bg-surface:        #FFFFFF;  /* secondarySystemGroupedBackground (cards) */\n  --bg-elevated:       #FFFFFF;\n  --bg-input:          #E5E5EA;  /* systemGray5 — text-field fill */\n\n  --fg-primary:        #000000;\n  --fg-secondary:      rgba(60, 60, 67, 0.60);\n  --fg-tertiary:       rgba(60, 60, 67, 0.30);\n  --fg-on-accent:      #FFFFFF;\n\n  --separator:         rgba(60, 60, 67, 0.18);\n  --separator-opaque:  #C6C6C8;\n\n  --accent:            var(--brand-pink);\n  --accent-fg:         #FFFFFF;\n  --success:           #34C759;\n  --warning:           #FF9F0A;\n  --danger:            #FF3B30;\n  --info:              #0A84FF;\n\n  /* ===== Type scale (rem-based, iOS semantic mirror) ===== */\n  --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;\n  --font-mono: 'JetBrains Mono', ui-monospace, 'SF Mono', Menlo, Consolas, monospace;\n\n  --fs-largeTitle:  34px; --lh-largeTitle: 41px; --fw-largeTitle: 700;\n  --fs-title1:      28px; --lh-title1:     34px; --fw-title1:     700;\n  --fs-title2:      22px; --lh-title2:     28px; --fw-title2:     700;\n  --fs-title3:      20px; --lh-title3:     25px; --fw-title3:     600;\n  --fs-headline:    17px; --lh-headline:   22px; --fw-headline:   600;\n  --fs-body:        17px; --lh-body:       22px; --fw-body:       400;\n  --fs-callout:     16px; --lh-callout:    21px; --fw-callout:    400;\n  --fs-subheadline: 15px; --lh-subheadline:20px; --fw-subheadline:400;\n  --fs-footnote:    13px; --lh-footnote:   18px; --fw-footnote:   400;\n  --fs-caption1:    12px; --lh-caption1:   16px; --fw-caption1:   400;\n  --fs-caption2:    11px; --lh-caption2:   13px; --fw-caption2:   400;\n\n  /* ===== Radii ===== */\n  --radius-sm:  8px;\n  --radius-md: 10px;\n  --radius-lg: 12px;  /* cards, buttons, sheets */\n  --radius-xl: 16px;\n\n  /* ===== Spacing (8pt grid) ===== */\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n\n  /* ===== Elevation (we use almost none — tokens exist for completeness) ===== */\n  --shadow-sheet: 0 -2px 10px rgba(0,0,0,0.04);\n  --shadow-card:  0 1px 2px rgba(0,0,0,0.04);\n}\n\n/* ---------- Dark mode ---------- */\n@media (prefers-color-scheme: dark) {\n  :root {\n    --bg-grouped:        #000000;  /* OLED pure black */\n    --bg-surface:        #1C1C1E;  /* secondarySystemGroupedBackground dark */\n    --bg-elevated:       #2C2C2E;\n    --bg-input:          #2C2C2E;\n\n    --fg-primary:        #FFFFFF;\n    --fg-secondary:      rgba(235, 235, 245, 0.60);\n    --fg-tertiary:       rgba(235, 235, 245, 0.30);\n\n    --separator:         rgba(84, 84, 88, 0.60);\n    --separator-opaque:  #38383A;\n\n    --accent:            #EB6478;  /* lifted Paradise Pink for dark */\n    --brand-pink-tint:   rgba(235, 100, 120, 0.16);\n    --hero-green:        #30D158;\n    --hero-green-tint:   rgba(48, 209, 88, 0.18);\n    --warning:           #FF9F0A;\n    --danger:            #FF453A;\n    --info:              #0A84FF;\n\n    --shadow-card:       0 1px 2px rgba(0,0,0,0.5);\n  }\n}\n\n/* Explicit theme override classes (for preview cards that force a mode) */\n[data-theme=\"light\"] {\n  --bg-grouped: #F2F2F7; --bg-surface: #FFFFFF; --bg-elevated: #FFFFFF; --bg-input: #E5E5EA;\n  --fg-primary: #000000; --fg-secondary: rgba(60,60,67,0.60); --fg-tertiary: rgba(60,60,67,0.30);\n  --separator: rgba(60,60,67,0.18); --separator-opaque: #C6C6C8;\n  --accent: #E4455E; --brand-pink-tint: rgba(228,69,94,0.12);\n  --hero-green: #34C759; --hero-green-tint: rgba(52,199,89,0.10);\n  --danger: #FF3B30;\n}\n[data-theme=\"dark\"] {\n  --bg-grouped: #000000; --bg-surface: #1C1C1E; --bg-elevated: #2C2C2E; --bg-input: #2C2C2E;\n  --fg-primary: #FFFFFF; --fg-secondary: rgba(235,235,245,0.60); --fg-tertiary: rgba(235,235,245,0.30);\n  --separator: rgba(84,84,88,0.60); --separator-opaque: #38383A;\n  --accent: #EB6478; --brand-pink-tint: rgba(235,100,120,0.16);\n  --hero-green: #30D158; --hero-green-tint: rgba(48,209,88,0.18);\n  --danger: #FF453A;\n}\n\n/* ---------- Base type ---------- */\nhtml, body {\n  font-family: var(--font-sans);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  color: var(--fg-primary);\n  background: var(--bg-grouped);\n  -webkit-font-smoothing: antialiased;\n  -moz-osx-font-smoothing: grayscale;\n}\n\n/* ---------- Semantic text roles ---------- */\n.ds-largeTitle  { font-size: var(--fs-largeTitle);  line-height: var(--lh-largeTitle);  font-weight: var(--fw-largeTitle);  letter-spacing: 0.37px; }\n.ds-title1      { font-size: var(--fs-title1);      line-height: var(--lh-title1);      font-weight: var(--fw-title1);      letter-spacing: 0.36px; }\n.ds-title2      { font-size: var(--fs-title2);      line-height: var(--lh-title2);      font-weight: var(--fw-title2);      letter-spacing: 0.35px; }\n.ds-title3      { font-size: var(--fs-title3);      line-height: var(--lh-title3);      font-weight: var(--fw-title3); }\n.ds-headline    { font-size: var(--fs-headline);    line-height: var(--lh-headline);    font-weight: var(--fw-headline); }\n.ds-body        { font-size: var(--fs-body);        line-height: var(--lh-body);        font-weight: var(--fw-body); }\n.ds-callout     { font-size: var(--fs-callout);     line-height: var(--lh-callout); }\n.ds-subheadline { font-size: var(--fs-subheadline); line-height: var(--lh-subheadline); }\n.ds-footnote    { font-size: var(--fs-footnote);    line-height: var(--lh-footnote); }\n.ds-caption     { font-size: var(--fs-caption1);    line-height: var(--lh-caption1); }\n.ds-caption2    { font-size: var(--fs-caption2);    line-height: var(--lh-caption2); }\n\n.ds-mono     { font-family: var(--font-mono); font-feature-settings: 'tnum', 'zero'; }\n.ds-secondary{ color: var(--fg-secondary); }\n.ds-tertiary { color: var(--fg-tertiary); }\n.ds-accent   { color: var(--accent); }\n.ds-success  { color: var(--hero-green); }\n.ds-warning  { color: var(--warning); }\n.ds-danger   { color: var(--danger); }\n\n/* Hero pattern specimen — THE one moment */\n.ds-heroPattern {\n  font-family: var(--font-mono);\n  font-size: 28px;\n  line-height: 34px;\n  font-weight: 700;\n  color: var(--hero-green);\n  letter-spacing: 0.5px;\n}\n<\u002Fstyle>\n<title>CallNinja · Logo &amp; App Icon<\u002Ftitle>\n\n<style>\n  body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:flex;gap:18px;align-items:center;justify-content:center;min-height:320px}\n  .card{background:#fff;border-radius:18px;padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px;border:1px solid rgba(0,0,0,.06)}\n  .lab{font-family:var(--font-mono);font-size:10.5px;color:rgba(60,60,67,.6);text-transform:uppercase;letter-spacing:.6px}\n<\u002Fstyle><\u002Fhead><body>\n\n<div class=\"card\">\n  <svg xmlns=\"http://www.w3.org/2000/svg\" viewBox=\"0 0 200 200\" width=\"140\" height=\"140\">\n    <defs>\n      <linearGradient id=\"bg\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#151517\"><\u002Fstop><stop offset=\"1\" stop-color=\"#050506\"><\u002Fstop><\u002FlinearGradient>\n      <linearGradient id=\"blade\" x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\"><stop offset=\"0\" stop-color=\"#FF6680\"><\u002Fstop><stop offset=\"1\" stop-color=\"#C8324A\"><\u002Fstop><\u002FlinearGradient>\n    <\u002Fdefs>\n    <rect width=\"200\" height=\"200\" rx=\"44\" fill=\"url(#bg)\"><\u002Frect>\n    <g transform=\"translate(100 100)\">\n      <path d=\"M0 -78 L22 -22 L78 0 L22 22 L0 78 L-22 22 L-78 0 L-22 -22 Z\" fill=\"url(#blade)\"><\u002Fpath>\n      <circle r=\"34\" fill=\"#050506\"><\u002Fcircle>\n      <g transform=\"rotate(10) scale(1.3)\">\n        <image href=\"2bc0bf82-f2dc-4cb4-9443-f3c81c766176\" x=\"-25\" y=\"-25\" width=\"50\" height=\"50\" preserveAspectRatio=\"xMidYMid meet\"><\u002Fimage>\n      <\u002Fg>\n    <\u002Fg>\n  <\u002Fsvg>\n  <div class=\"lab\">app icon · 1024 ready<\u002
