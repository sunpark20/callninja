<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;display:flex;gap:14px;background:#fff;font-family:var(--font-sans)}
.sw{flex:1;border-radius:12px;overflow:hidden;border:1px solid var(--separator);display:flex;flex-direction:column;background:var(--bg-surface)}
.chip{height:86px;display:flex;align-items:flex-end;padding:10px;color:#fff;font-weight:600;font-size:12px}
.meta{padding:10px 12px}
.name{font-size:13px;font-weight:600;color:#000}
.hex{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.6);margin-top:2px}
.tag{font-size:10px;text-transform:uppercase;letter-spacing:.6px;color:rgba(60,60,67,.6);font-weight:600;margin-top:4px}
</style></head><body>
<div class="sw"><div class="chip" style="background:#E4455E">Paradise Pink</div><div class="meta"><div class="name">Accent / Primary</div><div class="hex">#E4455E · Pantone 17-1755</div><div class="tag">tint · prominent buttons</div></div></div>
<div class="sw"><div class="chip" style="background:#EB6478">Lifted Pink</div><div class="meta"><div class="name">Accent / Dark mode</div><div class="hex">#EB6478</div><div class="tag">dark counterpart</div></div></div>
<div class="sw"><div class="chip" style="background:#34C759">Hero Green</div><div class="meta"><div class="name">Pattern preview</div><div class="hex">#34C759</div><div class="tag">one moment only</div></div></div>
<div class="sw"><div class="chip" style="background:#0A0A0B">Ninja Black</div><div class="meta"><div class="name">Brand / Icon ground</div><div class="hex">#0A0A0B</div><div class="tag">logo, app icon</div></div></div>
</body></html>
