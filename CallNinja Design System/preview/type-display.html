<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:grid;grid-template-columns:120px 1fr auto;gap:12px;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.row:last-child{border-bottom:none}
.tok{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.65);font-weight:600;letter-spacing:.3px}
.spec{color:#000}
.size{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.6)}
</style></head><body>
<div class="row"><span class="tok">largeTitle</span><span class="spec" style="font-size:34px;line-height:41px;font-weight:700;letter-spacing:.37px">콜닌자 설정</span><span class="size">34 / 41 · 700</span></div>
<div class="row"><span class="tok">title1</span><span class="spec" style="font-size:28px;line-height:34px;font-weight:700">스팸을 조용히 차단</span><span class="size">28 / 34 · 700</span></div>
<div class="row"><span class="tok">title2</span><span class="spec" style="font-size:22px;line-height:28px;font-weight:700">사용할 나라를 선택하세요</span><span class="size">22 / 28 · 700</span></div>
<div class="row"><span class="tok">title3</span><span class="spec" style="font-size:20px;line-height:25px;font-weight:600">차단 슬롯</span><span class="size">20 / 25 · 600</span></div>
</body></html>
