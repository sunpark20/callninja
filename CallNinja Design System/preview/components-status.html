<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:flex;flex-direction:column;gap:12px}
.card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.ico{width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:17px}
.t{font-size:15px}
.sp{flex:1}
.count{font-family:var(--font-mono);font-variant-numeric:tabular-nums;font-size:20px;font-weight:700}
</style></head><body>
<div class="card"><span class="t">🇰🇷 대한민국</span><span class="sp"></span><span class="t" style="color:#FF9F0A">6/10 활성화</span></div>
<div class="card"><span class="t">🇰🇷 대한민국</span><span class="sp"></span><span class="t" style="color:#34C759">10/10 활성화</span></div>
<div class="card" style="justify-content:center;gap:10px"><span class="count">10/10 활성화</span><span style="color:#34C759;font-size:22px">✓</span></div>
<div class="card"><span class="ico" style="color:#E4455E">↻</span><span class="t" style="color:#E4455E">등록 중...</span></div>
</body></html>
