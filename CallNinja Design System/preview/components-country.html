<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row{background:#fff;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px}
.flag{font-size:24px}
.nm{font-size:17px;color:#000}
.sp{flex:1}
.code{font-family:var(--font-mono);font-size:15px;color:rgba(60,60,67,.6)}
.check{color:#0A84FF;font-size:17px;font-weight:600}
.material{background:rgba(255,255,255,.7);backdrop-filter:blur(20px);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;border:1px solid rgba(0,0,0,.06)}
.material .flag{font-size:34px}
.material .nm{font-weight:600}
.chev{color:rgba(60,60,67,.4)}
</style></head><body>
<div class="row"><span class="flag">🇰🇷</span><span class="nm">대한민국</span><span class="sp"></span><span class="code">+82</span><span class="check">✓</span></div>
<div class="row"><span class="flag">🇺🇸</span><span class="nm">미국</span><span class="sp"></span><span class="code">+1</span></div>
<div class="row"><span class="flag">🇯🇵</span><span class="nm">일본</span><span class="sp"></span><span class="code">+81</span></div>
<div class="material"><span class="flag">🇰🇷</span><div><div class="nm">대한민국</div><div class="code">+82</div></div><span class="sp"></span><span class="chev">›</span></div>
</body></html>
