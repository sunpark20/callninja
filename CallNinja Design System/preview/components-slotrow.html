<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:flex;flex-direction:column;gap:14px}
.card{background:#fff;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px}
.icon{width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:20px}
.pat{font-family:var(--font-mono);font-size:17px;color:#000}
.cap{font-family:var(--font-mono);font-size:12px;margin-top:2px}
.spacer{flex:1}
.toggle{width:51px;height:31px;background:#34C759;border-radius:999px;position:relative}
.toggle.off{background:rgba(120,120,128,.32)}
.toggle::after{content:'';position:absolute;width:27px;height:27px;background:#fff;border-radius:50%;top:2px;left:22px;box-shadow:0 2px 4px rgba(0,0,0,.15)}
.toggle.off::after{left:2px}
.left{display:flex;flex-direction:column}
.empty{color:rgba(60,60,67,.6);font-size:17px}
</style></head><body>
<div class="card"><div class="icon" style="color:#34C759">🛡</div><div class="left"><span class="pat">070-85XX-XXXX</span><span class="cap" style="color:#34C759">100만개 차단 중</span></div><div class="spacer"></div><div class="toggle"></div></div>
<div class="card"><div class="icon" style="color:rgba(60,60,67,.6)">⊘</div><div class="left"><span class="pat">031-88XX-XXXX</span><span class="cap" style="color:rgba(60,60,67,.6)">차단 중지됨</span></div><div class="spacer"></div><div class="toggle off"></div></div>
<div class="card"><div class="icon" style="color:rgba(60,60,67,.45)">＋</div><div class="empty">차단할 번호를 입력하세요</div></div>
<div class="card"><div class="icon" style="color:#FF9F0A">⚠︎</div><div class="left"><span class="pat">010-34XX-XXXX</span><span class="cap" style="color:#FF9F0A">설정에서 켜주세요</span></div><div class="spacer"></div><div class="toggle off"></div></div>
</body></html>
