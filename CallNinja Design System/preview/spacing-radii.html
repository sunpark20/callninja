<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.r{display:flex;flex-direction:column;gap:8px;align-items:center}
.box{width:100%;height:88px;background:#E4455E}
.cap{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.7)}
.nm{font-size:12px;font-weight:600;color:#000}
</style></head><body>
<div class="r"><div class="box" style="border-radius:8px"></div><div class="nm">radius-sm</div><div class="cap">8px · small badges</div></div>
<div class="r"><div class="box" style="border-radius:10px"></div><div class="nm">radius-md</div><div class="cap">10px · internal cells</div></div>
<div class="r"><div class="box" style="border-radius:12px"></div><div class="nm">radius-lg</div><div class="cap">12px · cards, buttons</div></div>
<div class="r"><div class="box" style="border-radius:999px;height:40px"></div><div class="nm">radius-full</div><div class="cap">pills, toggles</div></div>
</body></html>
