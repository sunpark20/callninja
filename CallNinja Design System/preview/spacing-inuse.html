<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1fr;gap:16px}
.ex{background:#fff;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:8px}
.ex .l{font-family:var(--font-mono);font-size:10.5px;color:rgba(60,60,67,.6);text-transform:uppercase;letter-spacing:.6px}
.stack-4{display:flex;flex-direction:column;gap:4px}
.stack-12{display:flex;flex-direction:column;gap:12px}
.stack-24{display:flex;flex-direction:column;gap:24px}
.bar{height:6px;background:#E4455E;border-radius:3px;width:60%}
.bar2{height:6px;background:rgba(60,60,67,.15);border-radius:3px;width:45%}
.t{font-size:15px;color:#000}
.s{font-size:13px;color:rgba(60,60,67,.6)}
</style></head><body>
<div class="ex"><div class="l">stack gap · 4px</div><div class="stack-4"><div class="t">010-34XX-XXXX</div><div class="s" style="color:#34C759">100만개 차단 중</div></div></div>
<div class="ex"><div class="l">stack gap · 12px</div><div class="stack-12"><div class="bar"></div><div class="bar2"></div><div class="bar" style="width:75%"></div></div></div>
<div class="ex"><div class="l">stack gap · 24px · onboarding</div><div class="stack-24"><div class="t" style="font-weight:700">사용할 나라를 선택하세요</div><div class="s">선택한 나라의 전화번호 형식에 맞게 차단 범위가 자동 계산됩니다.</div></div></div>
<div class="ex"><div class="l">card padding · 16px</div><div style="outline:1px dashed #E4455E;padding:16px;border-radius:8px"><div class="t">🇰🇷 대한민국</div><div class="s">+82</div></div></div>
</body></html>
