<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#F2F2F7;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
.t{background:#fff;border-radius:10px;padding:14px 10px;display:flex;flex-direction:column;gap:8px;align-items:center;text-align:center}
.ic{width:34px;height:34px;display:flex;align-items:center;justify-content:center;font-size:26px}
.nm{font-family:var(--font-mono);font-size:10.5px;color:rgba(60,60,67,.7);font-weight:600}
.u{font-size:10.5px;color:rgba(60,60,67,.6);line-height:1.35}
</style></head><body>
<div class="t"><div class="ic" style="color:#34C759">🛡</div><div class="nm">shield.fill</div><div class="u">active slot</div></div>
<div class="t"><div class="ic" style="color:rgba(60,60,67,.6)">⊘</div><div class="nm">shield.slash</div><div class="u">paused</div></div>
<div class="t"><div class="ic" style="color:rgba(60,60,67,.45)">＋</div><div class="nm">plus.circle</div><div class="u">empty slot</div></div>
<div class="t"><div class="ic" style="color:#FF9F0A">⚠︎</div><div class="nm">triangle.fill</div><div class="u">ext. off</div></div>
<div class="t"><div class="ic" style="color:#FF3B30">✕</div><div class="nm">xmark.circle</div><div class="u">error</div></div>
<div class="t"><div class="ic" style="color:#34C759">✓</div><div class="nm">check.circle</div><div class="u">all enabled</div></div>
<div class="t"><div class="ic" style="color:#0A84FF">✓</div><div class="nm">checkmark</div><div class="u">picker tick</div></div>
<div class="t"><div class="ic" style="color:rgba(60,60,67,.4)">›</div><div class="nm">chevron.right</div><div class="u">nav</div></div>
<div class="t"><div class="ic">⚙</div><div class="nm">gearshape</div><div class="u">toolbar</div></div>
<div class="t"><div class="ic">🔍</div><div class="nm">magnifyingglass</div><div class="u">search</div></div>
</body></html>
