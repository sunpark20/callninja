<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:grid;grid-template-columns:120px 1fr auto;gap:12px;align-items:baseline;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.tok{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.65);font-weight:600}
.size{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.6)}
.mono{font-family:var(--font-mono);font-feature-settings:'tnum','zero'}
</style></head><body>
<div class="row"><span class="tok">hero</span><span class="mono" style="font-size:28px;font-weight:700;color:#34C759">070-85XX-XXXX</span><span class="size">mono · 28 · 700</span></div>
<div class="row"><span class="tok">title2.mono</span><span class="mono" style="font-size:22px;font-weight:700">010-34XX-XXXX</span><span class="size">mono · 22 · 700</span></div>
<div class="row"><span class="tok">body.mono</span><span class="mono" style="font-size:17px">031-88XX-XXXX</span><span class="size">mono · 17 · 400</span></div>
<div class="row"><span class="tok">caption.mono</span><span class="mono" style="font-size:12px;color:rgba(60,60,67,.6)">82107485000000 ~ 82107485999999</span><span class="size">mono · 12 · 400</span></div>
<div class="row"><span class="tok">digit count</span><span class="mono" style="font-size:17px;font-variant-numeric:tabular-nums">1,000,000개</span><span class="size">tnum</span></div>
</body></html>
