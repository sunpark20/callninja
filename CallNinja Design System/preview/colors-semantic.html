<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px;background:#fff;font-family:var(--font-sans)}
.sw{border-radius:12px;overflow:hidden;border:1px solid rgba(0,0,0,.08);display:flex;flex-direction:column;background:#fff}
.chip{height:70px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff}
.meta{padding:10px 12px}
.name{font-size:12px;font-weight:600;color:#000}
.hex{font-family:var(--font-mono);font-size:10.5px;color:rgba(60,60,67,.6);margin-top:2px}
.use{font-size:10.5px;color:rgba(60,60,67,.6);margin-top:6px;line-height:1.35}
</style></head><body>
<div class="sw"><div class="chip" style="background:#34C759">SUCCESS</div><div class="meta"><div class="name">Success / Hero</div><div class="hex">#34C759</div><div class="use">100만개 차단 중, pattern preview</div></div></div>
<div class="sw"><div class="chip" style="background:#FF9F0A">WARNING</div><div class="meta"><div class="name">Warning</div><div class="hex">#FF9F0A</div><div class="use">Partial activation (6/10)</div></div></div>
<div class="sw"><div class="chip" style="background:#FF3B30">DANGER</div><div class="meta"><div class="name">Danger</div><div class="hex">#FF3B30</div><div class="use">Reload failed, app-group error</div></div></div>
<div class="sw"><div class="chip" style="background:#0A84FF">INFO</div><div class="meta"><div class="name">Info</div><div class="hex">#0A84FF</div><div class="use">Country picker selection tick</div></div></div>
</body></html>
