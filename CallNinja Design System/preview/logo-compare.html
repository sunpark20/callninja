<!doctype html><html><head><meta charset="utf-8"/>
<style>
body{margin:0;padding:24px;background:#F2F2F7;font-family:-apple-system,Inter,sans-serif;display:flex;gap:24px;justify-content:center;align-items:flex-start}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.tile{background:#fff;border-radius:22px;padding:24px;border:1px solid rgba(0,0,0,.08)}
.lab{font-size:11px;color:#6b6b70;text-transform:uppercase;letter-spacing:.8px;font-weight:600}
.big{font-size:15px;font-weight:600;color:#111}
</style></head><body>

<div class="col">
  <div class="big">Before (r=30)</div>
  <div class="tile">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="180" height="180">
      <defs>
        <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#151517"/><stop offset="1" stop-color="#050506"/></linearGradient>
        <linearGradient id="bl1" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#FF6680"/><stop offset="1" stop-color="#C8324A"/></linearGradient>
      </defs>
      <rect width="200" height="200" rx="44" fill="url(#bg1)"/>
      <g transform="translate(100 100)">
        <path d="M0 -78 L22 -22 L78 0 L22 22 L0 78 L-22 22 L-78 0 L-22 -22 Z" fill="url(#bl1)"/>
        <circle r="30" fill="#050506"/>
      </g>
    </svg>
  </div>
  <div class="lab">inner disc too small</div>
</div>

<div class="col">
  <div class="big">After (r=34) ← 현재</div>
  <div class="tile">
    <img src="../assets/logo.svg?v=2" width="180" height="180"/>
  </div>
  <div class="lab">표창 느낌</div>
</div>

<div class="col">
  <div class="big">Lockup 참고</div>
  <div class="tile" style="background:transparent;border:none">
    <img src="../assets/logo-lockup.svg?v=2" width="280" height="70"/>
  </div>
  <div class="lab">목표 실루엣</div>
</div>

</body></html>
