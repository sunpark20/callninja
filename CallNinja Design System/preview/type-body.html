<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans)}
.row{display:grid;grid-template-columns:120px 1fr auto;gap:12px;align-items:baseline;padding:9px 0;border-bottom:1px solid rgba(0,0,0,.06)}
.tok{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.65);font-weight:600}
.size{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.6)}
</style></head><body>
<div class="row"><span class="tok">headline</span><span style="font-size:17px;line-height:22px;font-weight:600">설정에서 10개 항목을 켜주세요</span><span class="size">17 / 22 · 600</span></div>
<div class="row"><span class="tok">body</span><span style="font-size:17px;line-height:22px">스팸 전화에서 본 번호를 그대로 입력하세요</span><span class="size">17 / 22 · 400</span></div>
<div class="row"><span class="tok">callout</span><span style="font-size:16px;line-height:21px">선택한 나라의 전화번호 형식에 맞게 차단</span><span class="size">16 / 21 · 400</span></div>
<div class="row"><span class="tok">subheadline</span><span style="font-size:15px;line-height:20px;color:rgba(60,60,67,.6)">설정 &gt; 앱 &gt; 전화 &gt; 차단 및 발신자 확인</span><span class="size">15 / 20 · 400</span></div>
<div class="row"><span class="tok">footnote</span><span style="font-size:13px;line-height:18px;color:rgba(60,60,67,.6)">연락처에 저장된 번호는 차단되지 않습니다.</span><span class="size">13 / 18 · 400</span></div>
<div class="row"><span class="tok">caption</span><span style="font-size:12px;line-height:16px;color:#34C759">100만개 차단 중</span><span class="size">12 / 16 · 400</span></div>
</body></html>
