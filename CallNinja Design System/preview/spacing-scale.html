<!doctype html><html><head><meta charset="utf-8"/>
<link rel="stylesheet" href="../colors_and_type.css"/>
<style>
body{margin:0;padding:22px;background:#fff;font-family:var(--font-sans);display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
.tok{border:1px solid rgba(0,0,0,.08);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px;align-items:center;background:#fff}
.nm{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.7);font-weight:600}
.v{font-family:var(--font-mono);font-size:11px;color:rgba(60,60,67,.6)}
.box{background:#E4455E}
</style></head><body>
<div class="tok"><div class="nm">space-1</div><div class="box" style="width:4px;height:4px"></div><div class="v">4px</div></div>
<div class="tok"><div class="nm">space-2</div><div class="box" style="width:8px;height:8px"></div><div class="v">8px</div></div>
<div class="tok"><div class="nm">space-3</div><div class="box" style="width:12px;height:12px"></div><div class="v">12px</div></div>
<div class="tok"><div class="nm">space-4</div><div class="box" style="width:16px;height:16px"></div><div class="v">16px · card padding</div></div>
<div class="tok"><div class="nm">space-5</div><div class="box" style="width:20px;height:20px"></div><div class="v">20px</div></div>
<div class="tok"><div class="nm">space-6</div><div class="box" style="width:24px;height:24px"></div><div class="v">24px · section gap</div></div>
<div class="tok"><div class="nm">space-8</div><div class="box" style="width:32px;height:32px"></div><div class="v">32px</div></div>
<div class="tok"><div class="nm">space-10</div><div class="box" style="width:40px;height:40px"></div><div class="v">40px</div></div>
</body></html>
