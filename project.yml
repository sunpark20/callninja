name: CallNinja
options:
  bundleIdPrefix: com.callninja
  deploymentTarget:
    iOS: "16.0"

settings:
  base:
    DEVELOPMENT_TEAM: GA2LMK5XL2
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.0"

targets:
  CallNinja:
    type: application
    platform: iOS
    sources:
      - CallNinja
    info:
      path: CallNinja/Info.plist
      properties:
        CFBundleDisplayName: "콜닌자"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.callninja.app
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        CODE_SIGN_ENTITLEMENTS: CallNinja/CallNinja.entitlements
    scheme:
      testTargets: []
      gatherCoverageData: false
    dependencies:
      - target: NinjaBlock00
      - target: NinjaBlock01
      - target: NinjaBlock02
      - target: NinjaBlock03
      - target: NinjaBlock04
      - target: NinjaBlock05
      - target: NinjaBlock06
      - target: NinjaBlock07
      - target: NinjaBlock08
      - target: NinjaBlock09

  NinjaBlock00:
    type: app-extension
    platform: iOS
    sources:
      - path: NinjaBlockBase
    info:
      path: NinjaBlock00/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.callkit.call-directory
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).CallDirectoryHandler
        CFBundleDisplayName: "콜닌자 슬롯 1"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.callninja.app.NinjaBlock00
        CODE_SIGN_ENTITLEMENTS: NinjaBlock.entitlements

